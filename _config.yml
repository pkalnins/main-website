
# Site settings
title: "Paul Kalnins, ND, MS"
subtitle: "Systems Medicine & Integrative Research"
email: "drpkalnins@gmail.com"
description: >-
  Naturopathic physician and independent researcher in systems medicine, 
  integrative physiology, and clinical data science. Clinical practice, 
  practitioner education, and botanical therapeutics research.
baseurl: ""
url: "https://drpkalnins.com"
minimal_mistakes_skin: "default"

# Build settings
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
sass:
  style: compressed

# Author info
author:
  name: " "
  avatar: "/assets/images/paul.jpg"
  bio: "Naturopathic physician and independent researcher working at the 
  intersection of systems science, traditional medicine, and modern 
  neuroendocrine-immune physiology. Clinician, educator, and writer — 
  with a focus on salutogenic medicine and botanical therapeutics."
  location: "Portland, OR"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:drpkalnins@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://linkedin.com/in/pkalnins9"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/pkalnins"
    - label: "Substack"
      icon: "fas fa-pen-nib"
      url: "https://pkalnins.substack.com"

# Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:drpkalnins@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://linkedin.com/in/pkalnins9"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/pkalnins"
    - label: "Substack"
      icon: "fas fa-pen-nib"
      url: "https://pkalnins.substack.com"

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: true
  - scope:
      path: "_pages"
      type: "pages"
    values:
      permalink: /:basename/

# Make sure Jekyll processes the _pages folder
include:
  - _pages
exclude:
  - vendor
  - .bundle
  - node_modules
  - _site
  - CHANGELOG.md
  - README.md
  - Gemfile
  - Gemfile.lock
